name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1" # weekly, Monday 06:00 UTC

permissions:
  contents: read

jobs:
  pip-audit:
    name: pip-audit (dependency vulnerabilities)
    runs-on: ubuntu-latest
    # Runs on the private repo too — pip-audit only reads the dependency tree
    # against the OSV/PyPI advisory DB; it publishes nothing.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Audit project dependencies
        uses: pypa/gh-action-pip-audit@v1.1.0
        with:
          inputs: .
