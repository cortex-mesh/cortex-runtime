services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  agent:
    build: .
    environment:
      REDIS_HOST: redis
      CORTEX_IDENTITY: demo-agent
      # Optional: set ANTHROPIC_API_KEY to use Claude instead of echo mode.
      # The key is read from your shell environment — it is never hard-coded here.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
