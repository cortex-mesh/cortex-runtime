site_name: cortex-runtime
site_description: Open agent orchestration runtime — bus, dispatch, turn loop, and plugin system
site_url: https://cortex-mesh.github.io/cortex-runtime/
repo_url: https://github.com/cortex-mesh/cortex-runtime
repo_name: cortex-mesh/cortex-runtime
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - search.highlight

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: ["."]
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Guides:
      - Writing a Provider: guides/provider.md
      - Writing a Plugin: guides/plugin.md
      - Minimal Agent: guides/minimal-agent.md
  - API Reference: api.md
  - Changelog: changelog.md
  - Contributing: contributing.md
