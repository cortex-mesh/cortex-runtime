name: Scorecard

on:
  push:
    branches: [main]
  workflow_dispatch:
  # NOTE (launch): add `schedule:` (weekly) and `branch_protection_rule:` triggers
  # once the repo is public so the score refreshes automatically.

permissions:
  contents: read

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    # Publishing results + the public badge require a public repo. Skip on the
    # private pre-launch repo; arms automatically at launch (drop the `if:`).
    if: ${{ !github.event.repository.private }}
    permissions:
      security-events: write
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ossf/scorecard-action@62b2cac7ed8198b15735ed49ab1e5cf35480ba46 # v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 5
      - uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          sarif_file: results.sarif
