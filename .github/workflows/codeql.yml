name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (python)
    runs-on: ubuntu-latest
    # Code scanning (CodeQL) requires the repo to be public (or GitHub Advanced
    # Security). It skips cleanly on the private pre-launch repo and arms
    # automatically once the repo is public. Drop the `if:` at launch.
    if: ${{ !github.event.repository.private }}
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: python
      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"
